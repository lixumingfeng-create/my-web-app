<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的网页App</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial;background:#f4f4f4;padding:40px}
    .box{max-width:500px;margin:0 auto;background:white;padding:30px;border-radius:12px;box-shadow:0 4px 12px #00000010;text-align:center}
    h1{color:#22c55e;margin-bottom:20px}
    button{padding:12px 24px;background:#0ea5e9;color:white;border:none;border-radius:8px;cursor:pointer;margin-top:20px}
  </style>
</head>
<body>
  <div class="box">
    <h1>✅ 部署成功！</h1>
    <p>这是你自己的网页 App</p>
    <button onclick="document.getElementById('tip').innerText='🎉 正常运行！'">点我测试</button>
    <p id="tip" style="margin-top:20px;font-size:18px"></p>
  </div>
</body>
</html>
