<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="英语教练">
<title>🚗 英语口袋教练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
:root{
  --primary:#7C6FF7;--primary-dark:#5A52D5;
  --success:#4ECCA3;--danger:#FF6B6B;--warning:#FFD700;
  --bg:#0F0E17;--surface:#1C1B2E;--surface2:#252438;
  --text:#FFFFFE;--text2:#A7A9BE;--border:#2E2D45;
  --safe-top:env(safe-area-inset-top,20px);
  --safe-bottom:env(safe-area-inset-bottom,20px);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;
}
.screen{display:none;min-height:100vh;min-height:-webkit-fill-available;
  flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
.screen.active{display:flex}

/* ── HOME ── */
.home-header{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.home-title{font-size:20px;font-weight:700}
.home-stats{display:flex;gap:8px;align-items:center}
.stat-badge{display:flex;align-items:center;gap:4px;background:var(--surface2);
  border-radius:20px;padding:6px 12px;font-size:14px;font-weight:600}
.lessons-grid{flex:1;padding:8px 16px 16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.lesson-card{background:var(--surface);border-radius:16px;padding:16px 18px;
  display:flex;align-items:center;gap:14px;border:1px solid var(--border);cursor:pointer;
  transition:transform .1s,background .15s;position:relative;overflow:hidden}
.lesson-card:active{transform:scale(.98);background:var(--surface2)}
.lesson-card.locked{opacity:.45;cursor:default}
.lesson-card.locked:active{transform:none}
.lesson-emoji{font-size:30px;width:50px;height:50px;display:flex;align-items:center;
  justify-content:center;background:var(--surface2);border-radius:12px;flex-shrink:0}
.lesson-info{flex:1}
.lesson-title{font-size:16px;font-weight:600;margin-bottom:3px}
.lesson-meta{font-size:12px;color:var(--text2)}
.lesson-stars{font-size:16px;letter-spacing:1px}

/* ── LESSON DETAIL ── */
.ld-header{padding:16px 20px 8px;display:flex;align-items:center;gap:12px}
.back-btn{font-size:22px;cursor:pointer;padding:8px;margin:-8px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px}
.back-btn:active{background:var(--surface2)}
.ld-body{flex:1;padding:16px 20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ld-emoji{font-size:52px;text-align:center;margin:4px 0}
.ld-title{font-size:22px;font-weight:700;text-align:center}
.ld-desc{font-size:13px;color:var(--text2);text-align:center}
.section-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.mode-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;width:100%;
  transition:background .15s;min-height:72px}
.mode-btn:active{background:var(--surface2)}
.mode-btn.driving-btn{background:linear-gradient(135deg,#2D1B69 0%,#1A1B4B 100%);border-color:var(--primary)}
.mode-icon{font-size:26px;width:44px;text-align:center;flex-shrink:0}
.mode-info{flex:1;text-align:left}
.mode-name{font-size:16px;font-weight:600;margin-bottom:2px;color:var(--text)}
.mode-desc{font-size:12px;color:var(--text2)}

/* ── DRIVING MODE ── */
.drv-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.drv-prog{font-size:14px;color:var(--text2)}
.drv-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 20px;gap:16px;text-align:center}
.drv-num{font-size:13px;color:var(--text2)}
.drv-en{font-size:34px;font-weight:700;line-height:1.3;color:var(--text);max-width:340px}
.type-chip{font-size:11px;background:var(--primary);color:#fff;padding:3px 10px;
  border-radius:10px;font-weight:600}
.drv-zh{font-size:20px;color:var(--success);font-weight:500;max-width:340px}
.drv-ex{font-size:14px;color:var(--text2);line-height:1.6;max-width:340px;font-style:italic}
.wave{display:flex;gap:4px;height:28px;align-items:center}
.wave span{width:4px;height:6px;background:var(--primary);border-radius:2px;animation:wave 1.2s ease-in-out infinite}
.wave span:nth-child(2){animation-delay:.1s}
.wave span:nth-child(3){animation-delay:.2s}
.wave span:nth-child(4){animation-delay:.3s}
.wave span:nth-child(5){animation-delay:.4s}
@keyframes wave{0%,100%{height:6px}50%{height:22px}}
.drv-footer{padding:16px 20px;display:flex;gap:10px}
.drv-nav{flex:1;padding:18px;border-radius:14px;border:none;font-size:17px;
  font-weight:600;cursor:pointer;background:var(--surface2);color:var(--text);min-height:68px}
.drv-nav.nxt{background:var(--primary);flex:2}
.drv-nav:active{opacity:.8}

/* ── EXERCISE HEADER ── */
.ex-header{padding:14px 20px;display:flex;align-items:center;gap:12px}
.prog-wrap{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .35s}
.ex-counter{font-size:13px;color:var(--text2);min-width:36px;text-align:right}

/* ── CARD MODE ── */
.ex-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;gap:18px}
.card-wrap{width:100%;max-width:360px;perspective:1000px}
.card-flip{position:relative;width:100%;min-height:210px;transform-style:preserve-3d;
  transition:transform .45s;cursor:pointer}
.card-flip.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;min-height:210px;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:26px 22px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px}
.card-face.back{transform:rotateY(180deg);background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%)}
.card-en{font-size:28px;font-weight:700;text-align:center;color:var(--text);line-height:1.3}
.card-hint{font-size:12px;color:var(--text2);margin-top:4px}
.card-tts{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);
  transition:opacity .3s}
.card-zh{font-size:20px;font-weight:600;text-align:center;color:var(--success)}
.card-note{font-size:12px;color:var(--text2);text-align:center;line-height:1.5}
.card-example{font-size:13px;color:var(--text2);text-align:center;font-style:italic;
  line-height:1.5;padding-top:8px;border-top:1px solid var(--border);width:100%}
.actions{width:100%;max-width:360px;display:flex;gap:10px}
.act-btn{flex:1;padding:18px;border-radius:14px;border:none;font-size:16px;
  font-weight:700;cursor:pointer;min-height:68px;transition:transform .1s,opacity .1s}
.act-btn:active{transform:scale(.97);opacity:.85}
.act-btn.know{background:var(--success);color:#0A2218}
.act-btn.dontknow{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.act-btn.primary{background:var(--primary);color:#fff}
.act-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

/* ── LISTEN MODE ── */
.listen-icon{width:76px;height:76px;border-radius:50%;background:rgba(124,111,247,.12);
  display:flex;align-items:center;justify-content:center;font-size:34px;position:relative}
.listen-icon.playing::after{content:'';position:absolute;width:100%;height:100%;
  border-radius:50%;border:2px solid var(--primary);animation:ripple 1.5s ease-out infinite}
@keyframes ripple{0%{transform:scale(1);opacity:1}100%{transform:scale(1.7);opacity:0}}
.listen-en{font-size:22px;font-weight:700;text-align:center;opacity:0;transition:opacity .4s;max-width:340px;line-height:1.4}
.listen-en.show{opacity:1}
.choices{width:100%;max-width:360px;display:flex;flex-direction:column;gap:8px;
  opacity:0;transition:opacity .3s;pointer-events:none}
.choices.show{opacity:1;pointer-events:all}
.choice-btn{background:var(--surface);border:2px solid var(--border);border-radius:14px;
  padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;min-height:68px;
  transition:background .15s,border-color .15s}
.choice-btn:active{background:var(--surface2)}
.choice-btn.correct{border-color:var(--success);background:rgba(78,204,163,.12)}
.choice-btn.wrong{border-color:var(--danger);background:rgba(255,107,107,.12)}
.choice-letter{width:30px;height:30px;border-radius:50%;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  font-weight:700;flex-shrink:0;color:var(--text)}
.choice-text{font-size:15px;color:var(--text);flex:1;line-height:1.4}

/* ── SHADOW MODE ── */
.shd-en{font-size:24px;font-weight:700;text-align:center;color:var(--text);
  line-height:1.4;max-width:340px}
.shd-zh{font-size:15px;color:var(--text2);text-align:center;opacity:.8}
.shd-controls{display:flex;gap:10px;width:100%;max-width:360px}
.shd-play{flex:1;padding:16px;border-radius:14px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:15px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;min-height:60px}
.shd-play:active{background:var(--surface2)}
.eval-label{font-size:14px;color:var(--text2)}
.eval-row{display:flex;gap:10px;width:100%;max-width:360px}
.eval-btn{flex:1;padding:14px 6px;border-radius:14px;border:none;font-size:13px;
  font-weight:700;cursor:pointer;text-align:center;min-height:72px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.eval-btn .e-icon{font-size:22px}
.eval-btn.great{background:rgba(78,204,163,.18);border:1px solid var(--success);color:var(--success)}
.eval-btn.ok{background:rgba(255,215,0,.12);border:1px solid var(--warning);color:var(--warning)}
.eval-btn.replay{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.eval-btn:active{opacity:.8}

/* ── RESULT ── */
.result-body{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:32px 24px;gap:20px;text-align:center}
.result-emoji{font-size:68px;animation:pop .5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
.result-title{font-size:26px;font-weight:700}
.result-stars{font-size:38px;letter-spacing:4px;animation:pop .5s .2s both cubic-bezier(.175,.885,.32,1.275)}
.result-xp{font-size:17px;color:var(--warning);font-weight:700}
.result-stats{display:flex;gap:28px}
.rstat{display:flex;flex-direction:column;align-items:center;gap:3px}
.rstat .num{font-size:28px;font-weight:700}
.rstat .lbl{font-size:12px;color:var(--text2)}
.result-btns{width:100%;display:flex;flex-direction:column;gap:10px}

/* ── SETTINGS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-end}
.overlay.show{display:flex}
.settings-panel{background:var(--surface);border-radius:24px 24px 0 0;
  padding:24px 20px calc(24px + var(--safe-bottom));width:100%;max-height:72vh;overflow-y:auto}
.set-title{font-size:18px;font-weight:700;margin-bottom:20px}
.set-row{display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid var(--border)}
.set-label{font-size:16px}
.speed-btns{display:flex;gap:8px}
.speed-btn{padding:6px 14px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer}
.speed-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.speed-btn:active{opacity:.8}
.reset-btn{background:rgba(255,107,107,.15);border:1px solid var(--danger);color:var(--danger);
  padding:8px 16px;border-radius:10px;font-size:14px;cursor:pointer;font-weight:700}
.reset-btn:active{opacity:.8}

/* ── TOAST ── */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);
  background:var(--surface2);color:var(--text);padding:14px 24px;border-radius:16px;
  font-size:18px;font-weight:700;text-align:center;pointer-events:none;
  opacity:0;transition:all .2s;z-index:200;min-width:160px;border:1px solid var(--border)}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.toast.success{border-color:var(--success);color:var(--success)}
.toast.error{border-color:var(--danger);color:var(--danger)}

/* scrollbar hide */
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>

<!-- ════════════════ HOME ════════════════ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-title">🚗 英语口袋教练</div>
    <div class="home-stats">
      <div class="stat-badge">🔥 <span id="streak-cnt">0</span>天</div>
      <div class="stat-badge">⭐ <span id="xp-cnt">0</span></div>
      <div class="stat-badge" style="cursor:pointer" onclick="showSettings()">⚙️</div>
    </div>
  </div>
  <div class="lessons-grid" id="lessons-grid"></div>
</div>

<!-- ════════════════ LESSON DETAIL ════════════════ -->
<div id="screen-lesson" class="screen">
  <div class="ld-header">
    <div class="back-btn" onclick="navigate('home')">←</div>
    <div style="flex:1"></div>
    <div id="ld-stars" style="font-size:18px;letter-spacing:2px"></div>
  </div>
  <div class="ld-body">
    <div class="ld-emoji" id="ld-emoji"></div>
    <div class="ld-title" id="ld-title"></div>
    <div class="ld-desc" id="ld-desc"></div>
    <div class="section-label">🚗 免手驾驶模式</div>
    <button class="mode-btn driving-btn" onclick="startMode('driving')">
      <span class="mode-icon">🎧</span>
      <div class="mode-info">
        <div class="mode-name">驾驶模式</div>
        <div class="mode-desc">自动朗读英文＋中文释义，只需聆听</div>
      </div>
    </button>
    <div class="section-label">📱 互动练习模式（停车时用）</div>
    <button class="mode-btn" onclick="startMode('card')">
      <span class="mode-icon">🃏</span>
      <div class="mode-info">
        <div class="mode-name">单词卡片</div>
        <div class="mode-desc">翻转卡片，测试自己是否认识</div>
      </div>
    </button>
    <button class="mode-btn" onclick="startMode('listen')">
      <span class="mode-icon">🎯</span>
      <div class="mode-info">
        <div class="mode-name">听力辨义</div>
        <div class="mode-desc">听英文，选出正确的中文意思</div>
      </div>
    </button>
    <button class="mode-btn" onclick="startMode('shadow')">
      <span class="mode-icon">🗣️</span>
      <div class="mode-info">
        <div class="mode-name">跟读练习</div>
        <div class="mode-desc">听范读后跟读，练习口语发音</div>
      </div>
    </button>
  </div>
</div>

<!-- ════════════════ DRIVING MODE ════════════════ -->
<div id="screen-driving" class="screen">
  <div class="drv-header">
    <div class="back-btn" onclick="exitExercise()">✕</div>
    <div class="drv-prog" id="drv-prog">1 / 10</div>
    <div style="width:44px"></div>
  </div>
  <div class="drv-body">
    <div class="drv-num" id="drv-num">第 1 个</div>
    <div class="drv-en" id="drv-en">——</div>
    <div class="type-chip" id="drv-chip">词汇</div>
    <div class="drv-zh" id="drv-zh"></div>
    <div class="drv-ex" id="drv-ex"></div>
    <div class="wave" id="wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div style="font-size:12px;color:var(--text2)" id="drv-countdown"></div>
  </div>
  <div class="drv-footer">
    <button class="drv-nav" onclick="drvPrev()">← 上一个</button>
    <button class="drv-nav nxt" onclick="drvNext()">下一个 →</button>
  </div>
</div>

<!-- ════════════════ CARD MODE ════════════════ -->
<div id="screen-card" class="screen">
  <div class="ex-header">
    <div class="back-btn" onclick="exitExercise()">✕</div>
    <div class="prog-wrap"><div class="prog-fill" id="card-bar"></div></div>
    <div class="ex-counter" id="card-cnt">1/10</div>
  </div>
  <div class="ex-body">
    <div class="card-wrap">
      <div class="card-flip" id="card-flip" onclick="flipCard()">
        <div class="card-face front">
          <div class="type-chip" id="card-chip">词汇</div>
          <div class="card-en" id="card-en">Word</div>
          <div class="card-tts" id="card-tts">🔊 正在播放...</div>
          <div class="card-hint">点击卡片翻转查看释义</div>
        </div>
        <div class="card-face back">
          <div class="card-en" id="card-en-b">Word</div>
          <div class="card-zh" id="card-zh">中文</div>
          <div class="card-note" id="card-note"></div>
          <div class="card-example" id="card-ex"></div>
        </div>
      </div>
    </div>
    <div class="actions" id="card-acts" style="display:none">
      <button class="act-btn dontknow" onclick="cardAns(false)">✗ 不认识</button>
      <button class="act-btn know" onclick="cardAns(true)">✓ 认识</button>
    </div>
    <div id="card-hint2" style="font-size:12px;color:var(--text2)">翻转后评价自己是否认识</div>
  </div>
</div>

<!-- ════════════════ LISTEN MODE ════════════════ -->
<div id="screen-listen" class="screen">
  <div class="ex-header">
    <div class="back-btn" onclick="exitExercise()">✕</div>
    <div class="prog-wrap"><div class="prog-fill" id="lst-bar"></div></div>
    <div class="ex-counter" id="lst-cnt">1/10</div>
  </div>
  <div class="ex-body">
    <div class="listen-icon" id="lst-icon">🎧</div>
    <div style="font-size:13px;color:var(--text2)" id="lst-status">正在播放...</div>
    <div class="listen-en" id="lst-en"></div>
    <div class="choices" id="choices">
      <button class="choice-btn" id="ch0" onclick="lstAns(0)">
        <div class="choice-letter">A</div>
        <div class="choice-text" id="ct0">—</div>
      </button>
      <button class="choice-btn" id="ch1" onclick="lstAns(1)">
        <div class="choice-letter">B</div>
        <div class="choice-text" id="ct1">—</div>
      </button>
      <button class="choice-btn" id="ch2" onclick="lstAns(2)">
        <div class="choice-letter">C</div>
        <div class="choice-text" id="ct2">—</div>
      </button>
    </div>
  </div>
</div>

<!-- ════════════════ SHADOW MODE ════════════════ -->
<div id="screen-shadow" class="screen">
  <div class="ex-header">
    <div class="back-btn" onclick="exitExercise()">✕</div>
    <div class="prog-wrap"><div class="prog-fill" id="shd-bar"></div></div>
    <div class="ex-counter" id="shd-cnt">1/10</div>
  </div>
  <div class="ex-body">
    <div class="type-chip" id="shd-chip">词汇</div>
    <div class="shd-en" id="shd-en">English</div>
    <div class="shd-zh" id="shd-zh">中文</div>
    <div class="shd-controls">
      <button class="shd-play" onclick="shdPlay(null)">▶ 正常速</button>
      <button class="shd-play" onclick="shdPlay(0.72)">🐢 慢速</button>
    </div>
    <div class="eval-label">跟读后，评价自己：</div>
    <div class="eval-row">
      <button class="eval-btn great" onclick="shdEval('great')">
        <span class="e-icon">🎯</span>很棒
      </button>
      <button class="eval-btn ok" onclick="shdEval('ok')">
        <span class="e-icon">😊</span>一般
      </button>
      <button class="eval-btn replay" onclick="shdEval('replay')">
        <span class="e-icon">🔄</span>再听
      </button>
    </div>
  </div>
</div>

<!-- ════════════════ RESULT ════════════════ -->
<div id="screen-result" class="screen">

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let S = {
  lesson: null, mode: null,
  items: [], idx: 0,
  results: [],
  drvTimer: null, countdownTimer: null,
  settings: { speed: 0.9, delay: 7 },
  prog: {}
};

// ═══════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════
function loadProg() {
  try {
    const d = localStorage.getItem('eng_coach_v3');
    S.prog = d ? JSON.parse(d) : { lessons:{}, streak:{last:'',cnt:0}, xp:0 };
  } catch(e) {
    S.prog = { lessons:{}, streak:{last:'',cnt:0}, xp:0 };
  }
}

function saveProg() {
  localStorage.setItem('eng_coach_v3', JSON.stringify(S.prog));
}

function doStreak() {
  const today = new Date().toLocaleDateString('zh-CN');
  const s = S.prog.streak || { last:'', cnt:0 };
  if (s.last === today) return;
  const yesterday = new Date(Date.now()-86400000).toLocaleDateString('zh-CN');
  s.cnt = (s.last === yesterday) ? s.cnt + 1 : 1;
  s.last = today;
  S.prog.streak = s;
  saveProg();
}

function addXP(n) {
  S.prog.xp = (S.prog.xp || 0) + n;
  saveProg();
}

// ═══════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════
function speak(text, rate, lang) {
  return new Promise(res => {
    if (!window.speechSynthesis) { res(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'en-US';
    u.rate = rate || S.settings.speed;
    u.pitch = 1.0;
    u.onend = u.onerror = () => res();
    window.speechSynthesis.speak(u);
  });
}

function speakZH(text) { return speak(text, 0.88, 'zh-CN'); }
function stopSpeak() { if(window.speechSynthesis) window.speechSynthesis.cancel(); }

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
const SCREENS = ['home','lesson','driving','card','listen','shadow','result'];

function navigate(name) {
  stopSpeak(); clearDrvTimers();
  SCREENS.forEach(s => {
    const el = document.getElementById('screen-'+s);
    if(el) el.classList.remove('active');
  });
  const t = document.getElementById('screen-'+name);
  if(t) t.classList.add('active');
  if(name==='home') renderHome();
}

// ═══════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════
function renderHome() {
  loadProg();
  const p = S.prog;
  document.getElementById('streak-cnt').textContent = (p.streak||{}).cnt || 0;
  document.getElementById('xp-cnt').textContent = p.xp || 0;

  const grid = document.getElementById('lessons-grid');
  grid.innerHTML = '';

  VOCAB.lessons.forEach((lesson, i) => {
    const lp = (p.lessons||{})[lesson.id] || {};
    const prevDone = i === 0 || ((p.lessons||{})[VOCAB.lessons[i-1].id]||{}).stars > 0;
    const locked = !prevDone;
    const stars = lp.stars || 0;

    const card = document.createElement('div');
    card.className = 'lesson-card' + (locked ? ' locked' : '');
    card.innerHTML =
      `<div class="lesson-emoji">${lesson.emoji}</div>
      <div class="lesson-info">
        <div class="lesson-title">${lesson.title}</div>
        <div class="lesson-meta">${lesson.items.length} 个词汇${lp.best ? ' · 最佳 '+lp.best+'%' : ''}</div>
      </div>
      ${locked
        ? '<div style="font-size:24px;color:var(--text2)">🔒</div>'
        : `<div class="lesson-stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>`}`;
    if(!locked) card.onclick = () => openLesson(lesson.id);
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════
// LESSON DETAIL
// ═══════════════════════════════════════════
function openLesson(id) {
  const l = VOCAB.lessons.find(x => x.id===id);
  if(!l) return;
  S.lesson = l;
  document.getElementById('ld-emoji').textContent = l.emoji;
  document.getElementById('ld-title').textContent = l.title;
  document.getElementById('ld-desc').textContent = l.desc;
  const lp = (S.prog.lessons||{})[id]||{};
  const s = lp.stars||0;
  document.getElementById('ld-stars').textContent = '⭐'.repeat(s)+'☆'.repeat(3-s);
  navigate('lesson');
}

function startMode(mode) {
  if(!S.lesson) return;
  S.mode = mode; S.idx = 0; S.results = [];
  S.items = shuffle([...S.lesson.items]);
  navigate(mode);
  if(mode==='driving') initDrv();
  else if(mode==='card') initCard();
  else if(mode==='listen') initLst();
  else if(mode==='shadow') initShd();
}

function exitExercise() {
  stopSpeak(); clearDrvTimers();
  navigate(S.lesson ? 'lesson' : 'home');
}

// ═══════════════════════════════════════════
// DRIVING MODE
// ═══════════════════════════════════════════
function initDrv() { S.idx=0; showDrvItem(); }

function showDrvItem() {
  const item = S.items[S.idx];
  if(!item) { endDrv(); return; }
  const n = S.items.length;
  document.getElementById('drv-prog').textContent = `${S.idx+1} / ${n}`;
  document.getElementById('drv-num').textContent = `第 ${S.idx+1} 个`;
  document.getElementById('drv-en').textContent = item.en;
  document.getElementById('drv-chip').textContent = chipLabel(item.type);
  document.getElementById('drv-zh').textContent = item.zh;
  document.getElementById('drv-ex').textContent = item.ex ? `"${item.ex}"` : '';
  document.getElementById('drv-countdown').textContent = '';
  document.getElementById('wave').style.opacity='1';
  playDrvItem(item);
}

function playDrvItem(item) {
  clearDrvTimers();
  speak(item.en)
    .then(() => delay(400))
    .then(() => speakZH(item.zh))
    .then(() => delay(300))
    .then(() => item.ex ? speak('Example: '+item.ex, S.settings.speed*0.88) : null)
    .then(() => {
      document.getElementById('wave').style.opacity='0.3';
      let remaining = S.settings.delay;
      document.getElementById('drv-countdown').textContent = `${remaining}秒后自动下一个`;
      const tick = () => {
        remaining--;
        if(remaining > 0) {
          document.getElementById('drv-countdown').textContent = `${remaining}秒后自动下一个`;
          S.countdownTimer = setTimeout(tick, 1000);
        } else {
          drvNext();
        }
      };
      S.countdownTimer = setTimeout(tick, 1000);
    });
}

function drvNext() {
  clearDrvTimers(); stopSpeak();
  if(S.idx < S.items.length-1) { S.idx++; showDrvItem(); }
  else endDrv();
}

function drvPrev() {
  clearDrvTimers(); stopSpeak();
  if(S.idx > 0) { S.idx--; showDrvItem(); }
}

function endDrv() {
  clearDrvTimers();
  doStreak();
  showToast('🎧 驾驶学习完成！', 'success');
  setTimeout(() => navigate('lesson'), 1800);
}

function clearDrvTimers() {
  clearTimeout(S.drvTimer); clearTimeout(S.countdownTimer);
  S.drvTimer = null; S.countdownTimer = null;
}

// ═══════════════════════════════════════════
// CARD MODE
// ═══════════════════════════════════════════
let cardFlipped = false;

function initCard() { cardFlipped=false; S.idx=0; showCard(); }

function showCard() {
  const item = S.items[S.idx];
  if(!item) { endEx(); return; }
  setBar('card-bar', S.idx, S.items.length);
  document.getElementById('card-cnt').textContent = `${S.idx+1}/${S.items.length}`;
  document.getElementById('card-chip').textContent = chipLabel(item.type);
  document.getElementById('card-en').textContent = item.en;
  document.getElementById('card-en-b').textContent = item.en;
  document.getElementById('card-zh').textContent = item.zh;
  document.getElementById('card-note').textContent = item.note||'';
  document.getElementById('card-ex').textContent = item.ex ? `"${item.ex}"` : '';

  cardFlipped = false;
  document.getElementById('card-flip').classList.remove('flipped');
  document.getElementById('card-acts').style.display = 'none';
  document.getElementById('card-hint2').style.display = 'block';
  const tts = document.getElementById('card-tts');
  tts.textContent = '🔊 正在播放...'; tts.style.opacity='1';

  speak(item.en).then(() => {
    tts.textContent = '🔊 点击重播'; tts.style.opacity='0.5';
  });
}

function flipCard() {
  if(!cardFlipped) {
    cardFlipped = true;
    document.getElementById('card-flip').classList.add('flipped');
    document.getElementById('card-acts').style.display = 'flex';
    document.getElementById('card-hint2').style.display = 'none';
    stopSpeak();
    setTimeout(() => speakZH(S.items[S.idx].zh), 350);
  } else {
    stopSpeak();
    speak(S.items[S.idx].en);
  }
}

function cardAns(knew) {
  S.results.push({correct:knew});
  if(knew) { addXP(10); showToast('👍 +10 XP','success'); }
  S.idx++;
  setTimeout(() => S.idx >= S.items.length ? endEx() : showCard(), 280);
}

// ═══════════════════════════════════════════
// LISTEN MODE
// ═══════════════════════════════════════════
let lstCorrect=0, lstAnswered=false;

function initLst() { S.idx=0; showLst(); }

function showLst() {
  const item = S.items[S.idx];
  if(!item) { endEx(); return; }
  setBar('lst-bar', S.idx, S.items.length);
  document.getElementById('lst-cnt').textContent = `${S.idx+1}/${S.items.length}`;

  // Build options: 1 correct + 2 random distractors
  const pool = VOCAB.lessons.flatMap(l=>l.items).filter(x=>x.id!==item.id && x.zh!==item.zh);
  const opts = [item, ...shuffle(pool).slice(0,2)].sort(()=>Math.random()-.5);
  lstCorrect = opts.findIndex(o=>o.id===item.id);
  lstAnswered = false;

  opts.forEach((o,i) => {
    document.getElementById('ct'+i).textContent = o.zh;
    const b = document.getElementById('ch'+i);
    b.className = 'choice-btn';
    b.style.pointerEvents = 'auto';
  });

  const icon = document.getElementById('lst-icon');
  icon.classList.remove('playing');
  document.getElementById('lst-en').classList.remove('show');
  document.getElementById('choices').classList.remove('show');
  document.getElementById('lst-status').textContent = '正在播放...';

  icon.classList.add('playing');
  speak(item.en).then(() => {
    icon.classList.remove('playing');
    document.getElementById('lst-en').textContent = item.en;
    document.getElementById('lst-en').classList.add('show');
    document.getElementById('choices').classList.add('show');
    document.getElementById('lst-status').textContent = '请选择正确的中文意思';
  });
}

function lstAns(i) {
  if(lstAnswered) return; lstAnswered=true;
  const ok = i===lstCorrect;
  S.results.push({correct:ok});
  document.getElementById('ch'+i).classList.add(ok?'correct':'wrong');
  if(!ok) document.getElementById('ch'+lstCorrect).classList.add('correct');
  [0,1,2].forEach(j => document.getElementById('ch'+j).style.pointerEvents='none');
  if(ok) { addXP(10); showToast('✓ 正确！+10 XP','success'); }
  else showToast('✗ 错误','error');
  setTimeout(() => { S.idx++; S.idx>=S.items.length ? endEx() : showLst(); }, 1600);
}

// ═══════════════════════════════════════════
// SHADOW MODE
// ═══════════════════════════════════════════
function initShd() { S.idx=0; showShd(); }

function showShd() {
  const item = S.items[S.idx];
  if(!item) { endEx(); return; }
  setBar('shd-bar', S.idx, S.items.length);
  document.getElementById('shd-cnt').textContent = `${S.idx+1}/${S.items.length}`;
  document.getElementById('shd-chip').textContent = chipLabel(item.type);
  document.getElementById('shd-en').textContent = item.en;
  document.getElementById('shd-zh').textContent = item.zh;
  shdPlay(null);
}

function shdPlay(rate) {
  stopSpeak();
  speak(S.items[S.idx].en, rate || S.settings.speed);
}

function shdEval(r) {
  if(r==='replay') { shdPlay(0.72); return; }
  const xp = r==='great'?10:5;
  addXP(xp);
  showToast(r==='great'?'🎯 很棒！+10 XP':'😊 加油！+5 XP','success');
  S.results.push({correct:r==='great'});
  S.idx++;
  setTimeout(() => S.idx>=S.items.length ? endEx() : showShd(), 380);
}

// ═══════════════════════════════════════════
// END EXERCISE / RESULT
// ═══════════════════════════════════════════
function endEx() {
  stopSpeak(); doStreak();
  const ok = S.results.filter(r=>r.correct).length;
  const total = S.results.length;
  const acc = total>0 ? Math.round(ok/total*100) : 0;
  const stars = acc>=90?3:acc>=70?2:1;
  const xpBonus = stars===3?50:stars===2?30:10;

  const id = S.lesson.id;
  if(!S.prog.lessons) S.prog.lessons={};
  const ex = S.prog.lessons[id]||{};
  if(!ex.stars || stars>ex.stars) {
    S.prog.lessons[id] = { stars, best:acc };
  }
  addXP(xpBonus);
  saveProg();

  const emotes=['😊','🌟','🎉'];
  const titles=['课程完成！','表现不错！','完美通关！'];
  document.getElementById('res-emoji').textContent = emotes[stars-1];
  document.getElementById('res-title').textContent = titles[stars-1];
  document.getElementById('res-stars').textContent = '⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('res-xp').textContent = `+${xpBonus} XP 获得！`;
  document.getElementById('res-ok').textContent = ok;
  document.getElementById('res-ng').textContent = total-ok;
  document.getElementById('res-acc').textContent = acc+'%';
  navigate('result');
}

function retryLesson() {
  if(S.lesson) startMode(S.mode);
  else navigate('home');
}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
function showSettings() { document.getElementById('overlay').classList.add('show'); }

function hideSettings(e) {
  if(e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('show');
}

function setSpeed(v) {
  S.settings.speed = v;
  document.querySelectorAll('[data-sp]').forEach(b =>
    b.classList.toggle('active', parseFloat(b.dataset.sp)===v));
}

function setDelay(v) {
  S.settings.delay = v;
  document.querySelectorAll('[data-dl]').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.dl)===v));
}

function resetProg() {
  if(confirm('确定要重置所有进度？此操作不可恢复。')) {
    localStorage.removeItem('eng_coach_v3');
    S.prog = { lessons:{}, streak:{last:'',cnt:0}, xp:0 };
    document.getElementById('overlay').classList.remove('show');
    renderHome();
    showToast('进度已重置','error');
  }
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function shuffle(a) {
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

function setBar(id, idx, total) {
  document.getElementById(id).style.width = (idx/total*100)+'%';
}

function chipLabel(type) {
  return type==='word'?'词汇':type==='phrase'?'短语':'句子';
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show'+(type?' '+type:'');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 1800);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  loadProg(); renderHome();

  // iOS: prime speech synthesis with first touch
  document.addEventListener('touchstart', function primeAudio() {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    window.speechSynthesis.speak(u);
    document.removeEventListener('touchstart', primeAudio);
  }, {once:true, passive:true});
});

// Pause when screen locks
document.addEventListener('visibilitychange', () => {
  if(document.hidden) { stopSpeak(); clearDrvTimers(); }
});
</script>
